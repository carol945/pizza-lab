name: secret-scan-check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        shell: bash
        run: |
          set -euo pipefail
          VERSION="8.24.2"
          wget -qO gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Run secret scan
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports

          CONFIG_ARGS=""
          if [ -f .gitleaks.toml ]; then
            CONFIG_ARGS="--config .gitleaks.toml"
          fi

          BASELINE_ARGS=""
          if [ -f .gitleaksignore ]; then
            BASELINE_ARGS="--baseline-path .gitleaksignore"
          fi

          # Exit code 1 means leaks found, which should fail this check.
          gitleaks git \
            --redact \
            --report-format sarif \
            --report-path reports/secret-scan.sarif \
            ${CONFIG_ARGS} \
            ${BASELINE_ARGS}

      - name: Upload SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/secret-scan.sarif

      - name: Upload scan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-report
          path: reports/secret-scan.sarif
