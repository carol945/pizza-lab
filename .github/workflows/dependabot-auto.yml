name: dependabot-auto

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Enable auto-merge for Dependabot PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const node_id = context.payload.pull_request.node_id;

            const labels = (context.payload.pull_request.labels || []).map((l) => l.name);
            const semverLabel = labels.find((l) =>
              [
                'dependencies',
                'security',
                'dependabot',
                'dependencies:patch',
                'dependencies:minor',
              ].includes(l)
            );

            if (!semverLabel) {
              core.notice('No allow-list label found. Skipping auto-merge enablement.');
              return;
            }

            await github.graphql(
              `mutation($pullRequestId: ID!) {
                enablePullRequestAutoMerge(input: {
                  pullRequestId: $pullRequestId,
                  mergeMethod: SQUASH
                }) {
                  pullRequest { number }
                }
              }`,
              { pullRequestId: node_id }
            );

            core.info(`Enabled auto-merge for PR #${pull_number}.`);

      - name: Leave summary comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;
            const marker = '<!-- dependabot-auto-merge -->';
            const body = `${marker}\nAuto-merge is enabled for this Dependabot PR. It will merge after required checks and reviews pass.`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (c) => c.user.type === 'Bot' && typeof c.body === 'string' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
